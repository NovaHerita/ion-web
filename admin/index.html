<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ION — Admin Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <!-- Login Screen -->
  <div id="login-screen" class="screen active">
    <div class="login-card">
      <h1>ION Admin</h1>
      <p>Sign in to manage your site</p>
      <form id="login-form">
        <input type="email" id="login-email" placeholder="Email" required />
        <input type="password" id="login-password" placeholder="Password" required />
        <button type="submit">Sign In</button>
        <p id="login-error" class="error"></p>
      </form>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="dashboard" class="screen">
    <nav class="sidebar">
      <div class="sidebar-brand">
        <span>ION</span>
        <small>Admin</small>
      </div>
      <div class="sidebar-nav">
        <button class="nav-btn active" data-tab="articles">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 4h16v16H4z" rx="2"/><path d="M8 8h8M8 12h8M8 16h4"/></svg>
          Articles
        </button>
        <button class="nav-btn" data-tab="videos">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M10 9l5 3-5 3V9z"/></svg>
          Videos
        </button>
        <button class="nav-btn" data-tab="subscribers">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Subscribers
        </button>
        <button class="nav-btn" data-tab="newsletter">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
          Newsletter
        </button>
      </div>
      <button class="logout-btn" id="logout-btn">Sign Out</button>
    </nav>

    <main class="main-content">
      <!-- Articles Tab -->
      <div class="tab-panel active" id="tab-articles">
        <div class="panel-header">
          <h2>Articles</h2>
          <button class="btn-primary" id="add-article-btn">+ New Article</button>
        </div>
        <div id="articles-list" class="items-list"></div>
      </div>

      <!-- Article Form Modal -->
      <div class="modal" id="article-modal">
        <div class="modal-content">
          <div class="modal-header">
            <h3 id="article-modal-title">New Article</h3>
            <button class="modal-close" data-close="article-modal">&times;</button>
          </div>
          <form id="article-form">
            <input type="hidden" id="article-id" />
            <div class="form-group">
              <label>Type</label>
              <div class="toggle-group">
                <button type="button" class="toggle-btn active" data-type="custom">Write Article</button>
                <button type="button" class="toggle-btn" data-type="external">External Link</button>
              </div>
            </div>
            <div class="form-group">
              <label for="article-title">Title</label>
              <input type="text" id="article-title" required />
            </div>
            <div class="form-group">
              <label for="article-category">Category</label>
              <select id="article-category">
                <option value="RESEARCH">Research</option>
                <option value="CLINICAL INSIGHT">Clinical Insight</option>
                <option value="HISTORICAL INSIGHT">Historical Insight</option>
                <option value="THEORY">Theory</option>
                <option value="KNOWLEDGE">Knowledge</option>
                <option value="CASE STUDY">Case Study</option>
              </select>
            </div>
            <div class="form-group">
              <label for="article-summary">Summary</label>
              <textarea id="article-summary" rows="3"></textarea>
            </div>
            <div class="form-group" id="article-content-group">
              <label for="article-content">Content (HTML supported)</label>
              <textarea id="article-content" rows="10"></textarea>
            </div>
            <div class="form-group hidden" id="article-url-group">
              <label for="article-url">External URL</label>
              <input type="url" id="article-url" placeholder="https://..." />
            </div>
            <div class="form-group">
              <label class="checkbox-label">
                <input type="checkbox" id="article-published" checked />
                Published
              </label>
            </div>
            <div class="form-actions">
              <button type="button" class="btn-secondary" data-close="article-modal">Cancel</button>
              <button type="submit" class="btn-primary">Save Article</button>
            </div>
          </form>
        </div>
      </div>

      <!-- Videos Tab -->
      <div class="tab-panel" id="tab-videos">
        <div class="panel-header">
          <h2>Videos</h2>
          <button class="btn-primary" id="add-video-btn">+ New Video</button>
        </div>
        <div id="videos-list" class="items-list"></div>
      </div>

      <!-- Video Form Modal -->
      <div class="modal" id="video-modal">
        <div class="modal-content">
          <div class="modal-header">
            <h3 id="video-modal-title">New Video</h3>
            <button class="modal-close" data-close="video-modal">&times;</button>
          </div>
          <form id="video-form">
            <input type="hidden" id="video-id" />
            <div class="form-group">
              <label>Type</label>
              <div class="toggle-group">
                <button type="button" class="toggle-btn active" data-video-type="link">External Link</button>
                <button type="button" class="toggle-btn" data-video-type="upload">Upload MP4</button>
              </div>
            </div>
            <div class="form-group">
              <label for="video-title">Title</label>
              <input type="text" id="video-title" required />
            </div>
            <div class="form-group">
              <label for="video-description">Description</label>
              <textarea id="video-description" rows="3"></textarea>
            </div>
            <div class="form-group" id="video-url-group">
              <label for="video-url">Video URL (YouTube, Vimeo, etc.)</label>
              <input type="url" id="video-url" placeholder="https://..." />
            </div>
            <div class="form-group hidden" id="video-file-group">
              <label for="video-file">Video File</label>
              <input type="file" id="video-file" accept="video/mp4,video/webm" />
            </div>
            <div class="form-group">
              <label for="video-thumbnail">Thumbnail URL (optional)</label>
              <input type="url" id="video-thumbnail" placeholder="https://..." />
            </div>
            <div class="form-group">
              <label class="checkbox-label">
                <input type="checkbox" id="video-published" checked />
                Published
              </label>
            </div>
            <div class="form-actions">
              <button type="button" class="btn-secondary" data-close="video-modal">Cancel</button>
              <button type="submit" class="btn-primary">Save Video</button>
            </div>
          </form>
        </div>
      </div>

      <!-- Subscribers Tab -->
      <div class="tab-panel" id="tab-subscribers">
        <div class="panel-header">
          <h2>Subscribers</h2>
          <div class="stats-row" id="subscriber-stats"></div>
        </div>
        <div id="subscribers-list" class="items-list"></div>
      </div>

      <!-- Newsletter Tab -->
      <div class="tab-panel" id="tab-newsletter">
        <div class="panel-header">
          <h2>Send Newsletter</h2>
        </div>
        <form id="newsletter-form" class="newsletter-composer">
          <div class="form-group">
            <label for="newsletter-subject">Subject Line</label>
            <input type="text" id="newsletter-subject" placeholder="Your newsletter subject..." required />
          </div>
          <div class="form-group">
            <label for="newsletter-body">Body (HTML supported)</label>
            <textarea id="newsletter-body" rows="14" placeholder="Write your newsletter content here..." required></textarea>
          </div>
          <div class="form-actions">
            <button type="button" class="btn-secondary" id="newsletter-test-btn">Send Test Email</button>
            <button type="submit" class="btn-primary btn-send">Send to All Subscribers</button>
          </div>
          <p id="newsletter-status" class="status-message"></p>
        </form>
        <div class="newsletter-history">
          <h3>Send History</h3>
          <div id="newsletter-history-list"></div>
        </div>
      </div>
    </main>
  </div>

  <script src="/admin/admin.js"></script>
</body>
</html>
